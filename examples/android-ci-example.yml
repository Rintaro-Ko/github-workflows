# 使用例: Smart CI Pipeline with Firebase + Play Console
# このファイルを .github/workflows/android.yml としてコピーしてください

name: Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  ci:
    uses: Rintaro-Ko/github-workflows/.github/workflows/android-ci-smart.yml@main
    with:
      primary-module: app             # メインモジュール名
      # secondary-module: shared      # マルチモジュールの場合
      deploy-module: app              # デプロイ対象モジュール
      firebase-app-id: ${{ vars.FIREBASE_APP_ID }}
      firebase-tester-groups: MyApptest_Users
      play-package-name: com.example.app
    secrets: inherit
