name: Android Security DAST

on:
  workflow_call:
    inputs:
      primary-module:
        description: "Module to build APK from"
        required: true
        type: string
        default: "app"
      java-version:
        description: "JDK version"
        required: false
        type: string
        default: "17"
      java-distribution:
        description: "JDK distribution"
        required: false
        type: string
        default: "temurin"
      maestro-flow-dir:
        description: "Directory containing Maestro security test flows"
        required: false
        type: string
        default: ".maestro/security"
      api-level:
        description: "Android API level for emulator"
        required: false
        type: number
        default: 34
      build-flavor:
        description: "Build flavor (empty for no flavor)"
        required: false
        type: string
        default: ""

    outputs:
      dast-passed:
        description: "Whether DAST scan passed"
        value: ${{ jobs.binary-analysis.outputs.passed }}

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        env:
          MODULE: ${{ inputs.primary-module }}
          FLAVOR: ${{ inputs.build-flavor }}
        run: |
          if [ -n "$FLAVOR" ]; then
            TASK=":${MODULE}:assemble${FLAVOR^}Debug"
          else
            TASK=":${MODULE}:assembleDebug"
          fi
          ./gradlew "$TASK"

      - name: Find and upload APK
        id: apk
        run: |
          APK_PATH=$(find . -name "*.apk" -path "*/debug/*" | head -1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 7

  maestro-e2e:
    name: Maestro E2E Security Tests
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: /tmp/apk/

      - name: Check for Maestro flows
        id: check
        env:
          FLOW_DIR: ${{ inputs.maestro-flow-dir }}
        run: |
          [ -d "$FLOW_DIR" ] && echo "has_flows=true" >> "$GITHUB_OUTPUT" || echo "has_flows=false" >> "$GITHUB_OUTPUT"

      - name: Install Maestro
        if: steps.check.outputs.has_flows == 'true'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro security tests
        if: steps.check.outputs.has_flows == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level }}
          arch: x86_64
          script: |
            APK_PATH=$(find /tmp/apk/ -name "*.apk" | head -1)
            adb install "$APK_PATH"
            maestro test "$MAESTRO_DIR" --format junit --output /tmp/maestro-results.xml || true
        env:
          MAESTRO_DIR: ${{ inputs.maestro-flow-dir }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-results
          path: /tmp/maestro-results.xml
          retention-days: 7

  binary-analysis:
    name: APK Binary Analysis
    needs: build-apk
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.verdict.outputs.passed }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: /tmp/apk/

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq apktool 2>/dev/null || true

      - name: Decompile and analyze APK
        id: analysis
        run: |
          APK_PATH=$(find /tmp/apk/ -name "*.apk" | head -1)
          apktool d "$APK_PATH" -o /tmp/decompiled -f 2>/dev/null || true

          FINDINGS=""

          # Permission audit
          if [ -f /tmp/decompiled/AndroidManifest.xml ]; then
            for PERM in CAMERA READ_CONTACTS RECORD_AUDIO ACCESS_FINE_LOCATION READ_PHONE_STATE SEND_SMS; do
              grep -q "$PERM" /tmp/decompiled/AndroidManifest.xml 2>/dev/null && \
                FINDINGS="$FINDINGS\n[INFO] Permission: $PERM"
            done

            # Exported components count
            EXPORTED=$(grep -c 'exported="true"' /tmp/decompiled/AndroidManifest.xml 2>/dev/null || echo "0")
            [ "$EXPORTED" -gt 3 ] && FINDINGS="$FINDINGS\n[MEDIUM] $EXPORTED exported components"

            # Cleartext traffic
            grep -q 'usesCleartextTraffic="true"' /tmp/decompiled/AndroidManifest.xml 2>/dev/null && \
              FINDINGS="$FINDINGS\n[HIGH] Cleartext traffic permitted"

            # Debuggable
            grep -q 'debuggable="true"' /tmp/decompiled/AndroidManifest.xml 2>/dev/null && \
              FINDINGS="$FINDINGS\n[INFO] Debug build (debuggable=true)"
          fi

          # Network security config
          if [ ! -f /tmp/decompiled/res/xml/network_security_config.xml ]; then
            FINDINGS="$FINDINGS\n[MEDIUM] No network_security_config.xml"
          elif ! grep -q "pin-set" /tmp/decompiled/res/xml/network_security_config.xml 2>/dev/null; then
            FINDINGS="$FINDINGS\n[LOW] No certificate pinning configured"
          fi

          mkdir -p /tmp/binary-report
          echo -e "$FINDINGS" > /tmp/binary-report/findings.txt
          echo -e "# APK Binary Analysis\n$FINDINGS" > /tmp/binary-report/report.md

          echo "findings<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Determine pass/fail
        id: verdict
        env:
          FINDINGS: ${{ steps.analysis.outputs.findings }}
        run: |
          if echo "$FINDINGS" | grep -q "\[HIGH\]"; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binary-analysis-report
          path: /tmp/binary-report/
          retention-days: 30
