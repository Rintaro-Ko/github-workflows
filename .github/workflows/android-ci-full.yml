name: Reusable Android CI (Full Pipeline)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        default: '17'
        type: string
      java-distribution:
        description: 'Java distribution'
        default: 'temurin'
        type: string
      run-coverage:
        description: 'Run Kover coverage report'
        default: true
        type: boolean
      run-owasp:
        description: 'Run OWASP Dependency Check'
        default: true
        type: boolean
      deploy-module:
        description: 'Module to deploy (leave empty to skip deploy)'
        default: ''
        type: string
      deploygate-owner:
        description: 'DeployGate owner name'
        default: ''
        type: string
      deploy-on-push-only:
        description: 'Only deploy on push events'
        default: true
        type: boolean
    secrets:
      GITHUB_TOKEN:
        required: true
      DEPLOYGATE_API_KEY:
        required: false
      KEYSTORE_BASE64:
        required: false
      KEYSTORE_PASSWORD:
        required: false
      KEY_ALIAS:
        required: false
      KEY_PASSWORD:
        required: false

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Secret Detection (Gitleaks)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: OWASP Dependency Check
      if: ${{ inputs.run-owasp }}
      run: |
        ./gradlew dependencyCheckAnalyze || echo "Dependency check completed with warnings"
      continue-on-error: true

    - name: Android Security Lint
      run: ./gradlew lintDebug

    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          **/build/reports/dependency-check-report.html
          **/build/reports/lint-results-*.html
        retention-days: 14

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Ktlint Check
      run: ./gradlew ktlintCheck

    - name: Android Lint
      run: ./gradlew lintDebug

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [code-quality]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Kover Coverage Report
      if: ${{ inputs.run-coverage }}
      run: ./gradlew koverHtmlReport
      continue-on-error: true

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          **/build/reports/tests/
          **/build/reports/kover/
        retention-days: 14

  deploy-debug:
    name: Deploy Debug to DeployGate
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: ${{ inputs.deploy-module != '' && inputs.deploygate-owner != '' && (!inputs.deploy-on-push-only || github.event_name == 'push') }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew :${{ inputs.deploy-module }}:assembleDebug

    - name: Upload Debug to DeployGate
      uses: DeployGate/deploygate-upload-github-action@v1.1.1
      with:
        api_token: ${{ secrets.DEPLOYGATE_API_KEY }}
        owner_name: ${{ inputs.deploygate-owner }}
        file_path: ${{ inputs.deploy-module }}/build/outputs/apk/debug/${{ inputs.deploy-module }}-debug.apk
        message: "[Debug] ${{ inputs.deploy-module }} - ${{ github.sha }}"

  deploy-release:
    name: Deploy Release to DeployGate
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: ${{ inputs.deploy-module != '' && inputs.deploygate-owner != '' && (!inputs.deploy-on-push-only || github.event_name == 'push') }}

    steps:
    - name: Check Release Secrets
      run: |
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "::warning::KEYSTORE_BASE64 secret is not set. Skipping release build."
          echo "SKIP_RELEASE=true" >> $GITHUB_ENV
        else
          echo "SKIP_RELEASE=false" >> $GITHUB_ENV
        fi
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    - uses: actions/checkout@v4
      if: env.SKIP_RELEASE != 'true'

    - name: Set up JDK ${{ inputs.java-version }}
      if: env.SKIP_RELEASE != 'true'
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        cache: gradle

    - name: Grant execute permission for gradlew
      if: env.SKIP_RELEASE != 'true'
      run: chmod +x gradlew

    - name: Decode Keystore
      if: env.SKIP_RELEASE != 'true'
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/keystore.jks

    - name: Build Release APK
      if: env.SKIP_RELEASE != 'true'
      run: ./gradlew :${{ inputs.deploy-module }}:assembleRelease
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Release to DeployGate
      if: env.SKIP_RELEASE != 'true'
      uses: DeployGate/deploygate-upload-github-action@v1.1.1
      with:
        api_token: ${{ secrets.DEPLOYGATE_API_KEY }}
        owner_name: ${{ inputs.deploygate-owner }}
        file_path: ${{ inputs.deploy-module }}/build/outputs/apk/release/${{ inputs.deploy-module }}-release.apk
        message: "[Release] ${{ inputs.deploy-module }} - ${{ github.sha }}"

    - name: Clean up Keystore
      if: always() && env.SKIP_RELEASE != 'true'
      run: rm -f ${{ github.workspace }}/keystore.jks
