name: Android E2E (Maestro on Mac Mini Self-Hosted)

# Self-hosted Mac Mini runner で Maestro E2E を実行する再利用可能ワークフロー。
#
# 想定実行タイミング:
#   - PR             : tags=smoke, debug ビルドのみ
#   - develop merge  : tags=smoke,regression, debug+release ビルド + Firebase 配信
#   - main merge     : tags=smoke,regression,release-validation, release ビルド + Play Console
#   - 夜間 cron       : tags=regression,nightly, full sweep
#
# 排他制御 (concurrency) で同一リポジトリの E2E を直列実行する。
# Mac Mini 1 台で複数プロジェクトを共有する想定なので group キーは repository 単位。

on:
  workflow_call:
    inputs:
      app-module:
        description: "App module name to build"
        required: true
        type: string
      maestro-tags:
        description: "Comma-separated Maestro tag filters (e.g. smoke,regression)"
        required: false
        type: string
        default: "smoke"
      build-variant:
        description: "Gradle build variant: debug or release"
        required: false
        type: string
        default: "debug"
      install-package:
        description: "Application package id (for adb install verification)"
        required: true
        type: string
      maestro-flow-dir:
        description: ".maestro/flows directory inside the project"
        required: false
        type: string
        default: ".maestro/flows"
      firebase-app-id:
        description: "Firebase App ID for Distribution. Empty to skip."
        required: false
        type: string
        default: ""
      firebase-tester-groups:
        description: "Comma-separated Firebase tester groups."
        required: false
        type: string
        default: "testers"
      play-package-name:
        description: "Play Console package name. Empty to skip."
        required: false
        type: string
        default: ""
      play-track:
        description: "Play Console track (internal/alpha/beta/production)"
        required: false
        type: string
        default: "internal"
      retention-days:
        description: "Artifact retention in days"
        required: false
        type: number
        default: 14
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 60
    outputs:
      e2e-result:
        description: "PASS or FAIL"
        value: ${{ jobs.e2e.outputs.result }}

concurrency:
  group: e2e-mac-mini-${{ github.repository }}
  cancel-in-progress: false

jobs:
  e2e:
    name: Maestro E2E
    runs-on: [self-hosted, macos, mac-mini]
    timeout-minutes: ${{ inputs.timeout-minutes }}
    outputs:
      result: ${{ steps.gate.outputs.result }}
    env:
      MODULE: ${{ inputs.app-module }}
      VARIANT: ${{ inputs.build-variant }}
      PKG: ${{ inputs.install-package }}
      TAGS: ${{ inputs.maestro-tags }}
      FLOW_DIR: ${{ inputs.maestro-flow-dir }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Print runner info
        run: |
          echo "Runner: $(uname -a)"
          echo "Java: $(java -version 2>&1 | head -1)"
          echo "Maestro: $(maestro --version 2>/dev/null || echo 'not installed')"
          echo "ADB devices:"
          adb devices

      - name: Bootstrap (install Maestro if missing)
        run: |
          if ! command -v maestro >/dev/null 2>&1; then
            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$PATH:$HOME/.maestro/bin"
            echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          fi

      - name: Decode keystore (release only)
        if: inputs.build-variant == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          fi

      - name: Build APK
        env:
          ORG_GRADLE_PROJECT_MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ "$VARIANT" = "release" ]; then
            ./gradlew ":${MODULE}:assembleRelease"
          else
            ./gradlew ":${MODULE}:assembleDebug"
          fi

      - name: Locate APK
        id: apk
        run: |
          if [ "$VARIANT" = "release" ]; then
            APK=$(find "${MODULE}/build/outputs/apk/release" -name "*.apk" | head -1)
          else
            APK=$(find "${MODULE}/build/outputs/apk/debug" -name "*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "::error::APK not found"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Install APK on connected device
        env:
          APK_PATH: ${{ steps.apk.outputs.path }}
        run: |
          adb install -r -t "$APK_PATH"
          adb shell pm list packages | grep -q "$PKG" || (echo "::error::install failed"; exit 1)

      - name: Run Maestro flows
        id: maestro
        env:
          APK_PATH: ${{ steps.apk.outputs.path }}
        run: |
          mkdir -p "$RUNNER_TEMP/maestro-out"
          IFS=',' read -ra TAG_ARR <<< "$TAGS"
          ARGS=""
          for t in "${TAG_ARR[@]}"; do
            ARGS="$ARGS --include-tags $t"
          done
          set +e
          maestro test $ARGS --format=junit --output "$RUNNER_TEMP/maestro-out/junit.xml" "$FLOW_DIR"
          STATUS=$?
          set -e
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Pull device screenshots & screen recordings
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/maestro-out/device"
          adb shell screencap -p /sdcard/last.png 2>/dev/null && adb pull /sdcard/last.png "$RUNNER_TEMP/maestro-out/device/" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-results-${{ inputs.build-variant }}
          path: ${{ runner.temp }}/maestro-out/
          retention-days: ${{ inputs.retention-days }}

      - name: Gate
        id: gate
        env:
          STATUS: ${{ steps.maestro.outputs.status }}
        run: |
          if [ "$STATUS" = "0" ]; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "::error::Maestro suite failed"
            exit 1
          fi

  deploy-firebase:
    name: Deploy to Firebase (post-E2E)
    needs: [e2e]
    if: needs.e2e.outputs.result == 'PASS' && inputs.firebase-app-id != '' && inputs.build-variant == 'debug'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build debug APK
        env:
          ORG_GRADLE_PROJECT_MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          MODULE: ${{ inputs.app-module }}
        run: |
          chmod +x gradlew
          ./gradlew ":${MODULE}:assembleDebug"
      - name: Locate debug APK
        id: apk
        run: |
          APK=$(find "${{ inputs.app-module }}/build/outputs/apk/debug" -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
      - name: Distribute via Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ inputs.firebase-app-id }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ inputs.firebase-tester-groups }}
          file: ${{ steps.apk.outputs.path }}
          releaseNotes: |
            Automated build from ${{ github.sha }} (E2E PASSED)

  deploy-play-console:
    name: Deploy to Play Console (post-E2E)
    needs: [e2e]
    if: needs.e2e.outputs.result == 'PASS' && inputs.play-package-name != '' && inputs.build-variant == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
      - name: Build release AAB
        env:
          ORG_GRADLE_PROJECT_MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew ":${{ inputs.app-module }}:bundleRelease"
      - name: Locate AAB
        id: aab
        run: |
          AAB=$(find "${{ inputs.app-module }}/build/outputs/bundle/release" -name "*.aab" | head -1)
          echo "path=$AAB" >> "$GITHUB_OUTPUT"
      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: ${{ inputs.play-package-name }}
          releaseFiles: ${{ steps.aab.outputs.path }}
          track: ${{ inputs.play-track }}
          status: completed
